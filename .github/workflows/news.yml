name: Post gaming news

on:
  schedule:
    # 14:00 UTC every day. Change this cron to adjust frequency.
    - cron: "0 14 * * *"
  workflow_dispatch: {}   # lets you trigger a post manually from the Actions tab

# Allow the job to commit the updated articles file back to the repo
permissions:
  contents: write

# Never let two runs collide
concurrency:
  group: post-news
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Generate today's article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-news.mjs

      - name: Commit & push if changed
        run: |
          git config user.name  "games4all-news-bot"
          git config user.email "actions@users.noreply.github.com"
          git add news/articles.json
          if git diff --staged --quiet; then
            echo "No new article — nothing to commit."
          else
            git commit -m "news: add latest article"
            git push
          fi
